<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsubscribe</title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 0;
  background: #031440;
  color: #cbd4d4;
  font-family: 'Courier Prime', monospace;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.container {
  max-width: 500px;
  padding: 2rem;
}

h1 {
  font-size: 1.5rem;
  margin-bottom: 1rem;
}

p {
  font-size: 0.9rem;
  line-height: 1.8;
  text-transform: none;
}

a {
  color: #cbd4d4;
  display: inline-block;
  margin-top: 1.5rem;
  border: 1px solid rgba(203,212,212,0.3);
  padding: 0.75rem 1.2rem;
  text-decoration: none;
}

a:hover {
  opacity: 0.7;
}
</style>
</head>

<body>
  <div class="container">
    
    <p>
      If you no longer wish to receive thoughtwaves,<br> you may step out of this frequency.
    </p>

    <a href="mailto:your@email.com?subject=unsubscribe">Unsubscribe via email</a>

    <p style="margin-top:2rem; opacity:0.6; font-size:0.75rem;">
      Or simply reply to any message with “unsubscribe”.
    </p>
  </div>
</body>
</html>
