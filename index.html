<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armin Ards</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; line-height: 1.6; color: #222; background: #f9f9f9; }
  header { background: #111; color: white; padding: 80px 20px; text-align: center; }
  header h1 { margin: 0; font-size: 3em; }
  header p { font-size: 1.2em; margin-top: 10px; }
  section { padding: 60px 20px; max-width: 1000px; margin: auto; }
  h2 { text-align: center; margin-bottom: 40px; }
  .stories, .music { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
  .story, .track { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
  .story img { width: 100%; border-radius: 5px; }
  form { display: flex; flex-direction: column; max-width: 400px; margin: auto; }
  input, textarea, button { padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
  button { background: #111; color: white; border: none; cursor: pointer; }
  button:hover { background: #333; }
  footer { text-align: center; padding: 20px; background: #111; color: white; }
</style>
</head>
<body>

<header>
  <h1>Armin Ards</h1>
  <p>Stories, music, and moments</p>
</header>

<section id="stories">
  <h2>Stories</h2>
  <div class="stories">
    <div class="story">
      <img src="story1.jpg" alt="Story 1">
      <p>Short description of the story goes here.</p>
    </div>
    <div class="story">
      <img src="story2.jpg" alt="Story 2">
      <p>Another story description here.</p>
    </div>
    <!-- Add more stories -->
  </div>
</section>

<section id="music">
  <h2>Music</h2>
  <div class="music">
    <div class="track">
      <iframe src="https://open.spotify.com/embed/track/YOUR_TRACK_ID" width="100%" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
      <p>Track description</p>
    </div>
    <!-- Add more tracks -->
  </div>
</section>

<section id="newsletter">
  <h2>Newsletter</h2>
  <form action="https://YOUR_MAILCHIMP_FORM_URL" method="post">
    <input type="email" name="EMAIL" placeholder="Your email" required>
    <button type="submit">Subscribe</button>
  </form>
</section>

<section id="contact">
  <h2>Contact</h2>
  <form action="mailto:your@email.com" method="post" enctype="text/plain">
    <input type="text" name="name" placeholder="Your name" required>
    <input type="email" name="email" placeholder="Your email" required>
    <textarea name="message" rows="5" placeholder="Your message" required></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<footer>
  &copy; 2026 Armin Ards. All rights reserved.
</footer>

</body>
</html>
