<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title> • ARMIN ARDS • </title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #1A254F; /* navy blue */
}

/* BODY */
body {
  font-family: 'Courier Prime', monospace;
  margin: 0;
  color: #ffffff;
  text-transform: uppercase;
  line-height: 1.6;
  background-color: var(--primary);
}

/* HEADER */
header {
  text-align: center;
  padding: 80px 20px 50px;
  background-color: var(--primary);
}

header h1 {
  font-size: 3em;
  letter-spacing: 6px;
  margin: 0;
  color: #ffffff;
}

/* NAVIGATION */
nav {
  text-align: center;
  border-top: 1px solid #ffffff;
  border-bottom: 1px solid #ffffff;
}

nav button {
  background: none;
  border: none;
  padding: 18px 25px;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 3px;
  color: #ffffff;
}

nav button.active {
  text-decoration: underline;
}

/* SECTIONS */
section {
  display: none;
  padding: 80px 0;
  background-color: var(--primary);
}

section.active {
  display: block;
}

/* CONTENT CARD */
.content-frame {
  background-color: #ffffff; /* white card */
  color: var(--primary);
  border: 4px solid var(--primary);
  max-width: 700px;
  margin: 0 auto;
  padding: 30px 20px;
  border-radius: 12px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
  text-align: center;
}

/* SECTION HEADINGS */
h2 {
  text-align: center;
  margin-bottom: 30px;
  letter-spacing: 4px;
  font-size: 1.4em;
  color: var(--primary);
}

/* VISIONS / MUSIC */
.vision, .music {
  margin-bottom: 40px;
}

.vision img {
  width: 100%;
  border: 1px solid var(--primary);
  margin-bottom: 10px;
}

p {
  font-size: 0.9em;
  letter-spacing: 1px;
  color: var(--primary);
}

/* ABOUT SECTION */
#about img {
  width: 150px;
  height: auto;
  border-radius: 0;
  border: 3px solid var(--primary);
  margin-bottom: 20px;
}

#about p {
  font-size: 1em;
  margin-bottom: 20px;
  line-height: 1.5;
}

/* Divider line between text and social links */
.divider {
  border: none;
  height: 2px;
  background-color: var(--primary);
  margin: 20px 0;
}

.social-links {
  margin-top: 10px;
}

.social-links a {
  margin: 0 10px;
  text-decoration: none;
  color: var(--primary);
  font-weight: bold;
  transition: all 0.3s;
}

.social-links a:hover {
  color: #000000;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 40px 10px;
  border-top: 1px solid #ffffff;
  font-size: 0.8em;
  letter-spacing: 2px;
  background-color: var(--primary);
  color: #ffffff;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <h1> • ARMIN ARDS • </h1>
</header>

<!-- NAVIGATION -->
<nav>
  <button class="tab-btn active" data-tab="visions">VISIONS</button>
  <button class="tab-btn" data-tab="music">MUSIC</button>
  <button class="tab-btn" data-tab="about">ABOUT</button>
</nav>

<!-- VISIONS SECTION -->
<section id="visions" class="active">
  <div class="content-frame">
    <h2>I will start writing soon...</h2>
    <div class="visions">
      <div class="vision">
        <img src="images/vision1.jpg" alt="Vision 1">
        <p>A DARK AND MOODY VISION</p>
      </div>
      <div class="vision">
        <img src="images/vision2.jpg" alt="Vision 2">
        <p>ANOTHER EERIE MOMENT</p>
      </div>
    </div>
  </div>
</section>

<!-- MUSIC SECTION -->
<section id="music">
  <div class="content-frame">
    <h2>MUSIC</h2>
    <div class="music">
      <iframe src="https://open.spotify.com/embed/track/YOUR_TRACK_ID" width="100%" height="80"></iframe>
      <p>TRACK DESCRIPTION</p>
    </div>
  </div>
</section>

<!-- ABOUT SECTION -->
<section id="about">
  <div class="content-frame">
    <h2>ABOUT</h2>
    <img src="images/profile.jpg" alt="Armin Ards">
    <p>I need to think still hmm</p>
    <hr class="divider">
    <div class="social-links">
      <a href="https://x.com/arminards" target="_blank">X</a>
      <a href="https://www.instagram.com/arminards" target="_blank">INSTAGRAM</a>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  © 2026 ARMIN ARDS
</footer>

<!-- TAB SCRIPT -->
<script>
const tabs = document.querySelectorAll('.tab-btn');
const sections = document.querySelectorAll('section');

tabs.forEach(btn => {
  btn.addEventListener('click', () => {
    tabs.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const tab = btn.dataset.tab;
    sections.forEach(sec => {
      sec.classList.toggle('active', sec.id === tab);
    });
  });
});
</script>

</body>
</html>
