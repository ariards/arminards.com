<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title> • ARMIN ARDS • </title>

<!-- Typewriter-style font -->
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">

<style>
/* ------------------- ROOT VARIABLES ------------------- */
:root {
  --primary: #1A254F; /* navy blue for top/bottom sections */
}

/* ------------------- BODY ------------------- */
body {
  font-family: 'Courier Prime', monospace;
  margin: 0;
  background: #ffffff; /* neutral background */
  color: var(--primary); /* default text color */
  text-transform: uppercase;
  line-height: 1.6;
}

/* ------------------- TOP HEADER ------------------- */
header {
  text-align: center;
  padding: 80px 20px 50px;
  background-color: var(--primary); /* navy blue */
}

header h1 {
  font-size: 3em;
  letter-spacing: 6px;
  margin: 0;
  color: #ffffff; /* white text */
}

/* ------------------- NAVIGATION ------------------- */
nav {
  text-align: center;
  border-top: 1px solid var(--primary);
  border-bottom: 1px solid var(--primary);
}

nav button {
  background: none;
  border: none;
  padding: 18px 25px;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 3px;
  color: var(--primary);
}

nav button.active {
  text-decoration: underline;
}

/* ------------------- SECTIONS (GENERAL) ------------------- */
section {
  display: none;
  padding: 70px 20px;
  max-width: 700px;
  margin: auto;
}

section.active {
  display: block;
}

h2 {
  text-align: center;
  margin-bottom: 50px;
  letter-spacing: 4px;
  font-size: 1.4em;
}

/* ------------------- MIDDLE SECTIONS (VISIONS / MUSIC) ------------------- */
#visions, #music {
  background-color: #ffffff; /* neutral white */
  color: var(--primary);     /* navy text */
}

.vision, .music {
  margin-bottom: 40px;
}

.vision img {
  width: 100%;
  border: 1px solid var(--primary);
  margin-bottom: 10px;
}

p {
  font-size: 0.9em;
  letter-spacing: 1px;
}

/* ------------------- CONTACT SECTION (BOTTOM) ------------------- */
#contact {
  background-color: var(--primary); /* navy blue */
  color: #ffffff;                    /* white text */
}

#contact input,
#contact textarea {
  border: 1px solid #ffffff;
  color: #ffffff;
  background: none;
}

#contact button {
  background-color: #ffffff;
  color: var(--primary);
}

#contact button:hover {
  background-color: #ffffff;
  color: var(--primary);
}

/* ------------------- FORM ------------------- */
form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-width: 400px;
  margin: auto;
}

/* ------------------- FOOTER ------------------- */
footer {
  text-align: center;
  padding: 40px 10px;
  border-top: 1px solid #ffffff;
  font-size: 0.8em;
  letter-spacing: 2px;
  background-color: var(--primary); /* navy footer */
  color: #ffffff;                    /* white text */
}
</style>
</head>

<body>

<!-- =================== TOP HEADER =================== -->
<header>
  <h1> • ARMIN ARDS • </h1>
</header>

<!-- =================== NAVIGATION / TABS =================== -->
<nav>
  <button class="tab-btn active" data-tab="visions">VISIONS</button>
  <button class="tab-btn" data-tab="music">MUSIC</button>
  <button class="tab-btn" data-tab="contact">CONTACT</button>
</nav>

<!-- =================== MIDDLE SECTION: VISIONS =================== -->
<section id="visions" class="active">
  <h2>VISIONS</h2>
  <div class="visions">
    <div class="vision">
      <img src="images/vision1.jpg" alt="Vision 1">
      <p>A DARK AND MOODY VISION</p>
    </div>
    <div class="vision">
      <img src="images/vision2.jpg" alt="Vision 2">
      <p>ANOTHER EERIE MOMENT</p>
    </div>
  </div>
</section>

<!-- =================== MIDDLE SECTION: MUSIC =================== -->
<section id="music">
  <h2>MUSIC</h2>
  <div class="music">
    <iframe src="https://open.spotify.com/embed/track/YOUR_TRACK_ID" width="100%" height="80"></iframe>
    <p>TRACK DESCRIPTION</p>
  </div>
</section>

<!-- =================== BOTTOM SECTION: CONTACT =================== -->
<section id="contact">
  <h2>CONTACT</h2>
  <form>
    <input type="text" placeholder="YOUR NAME" required>
    <input type="email" placeholder="YOUR EMAIL" required>
    <textarea rows="5" placeholder="YOUR MESSAGE" required></textarea>
    <button type="submit">SEND</button>
  </form>
</section>

<!-- =================== FOOTER =================== -->
<footer>
  © 2026 ARMIN ARDS
</footer>

<!-- =================== TAB SWITCHING SCRIPT =================== -->
<script>
const tabs = document.querySelectorAll('.tab-btn');
const sections = document.querySelectorAll('section');

tabs.forEach(btn => {
  btn.addEventListener('click', () => {
    tabs.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const tab = btn.dataset.tab;
    sections.forEach(sec => {
      sec.classList.toggle('active', sec.id === tab);
    });
  });
});
</script>

</body>
</html>
