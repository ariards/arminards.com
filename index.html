<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title> • ARMIN ARDS • </title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #1A254F; /* navy blue */
}

/* ------------------- BODY ------------------- */
body {
  font-family: 'Courier Prime', monospace;
  margin: 0;
  color: #ffffff; /* default text white on navy */
  text-transform: uppercase;
  line-height: 1.6;
  background-color: var(--primary);
}

/* ------------------- HEADER ------------------- */
header {
  text-align: center;
  padding: 80px 20px 50px;
  background-color: var(--primary);
}

header h1 {
  font-size: 3em;
  letter-spacing: 6px;
  margin: 0;
  color: #ffffff;
}

/* ------------------- NAV ------------------- */
nav {
  text-align: center;
  border-top: 1px solid #ffffff;
  border-bottom: 1px solid #ffffff;
}

nav button {
  background: none;
  border: none;
  padding: 18px 25px;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 3px;
  color: #ffffff;
}

nav button.active {
  text-decoration: underline;
}

/* ------------------- SECTIONS ------------------- */
section {
  display: none;
  padding: 80px 0;
  background-color: var(--primary); /* navy for all sections */
}

section.active {
  display: block;
}

/* ------------------- CONTENT CARD ------------------- */
.content-frame {
  background-color: #ffffff; /* white card */
  color: var(--primary);
  border: 4px solid var(--primary);
  max-width: 700px;
  margin: 0 auto;
  padding: 30px 20px;
  border-radius: 12px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

/* ------------------- SECTION HEADINGS ------------------- */
h2 {
  text-align: center;
  margin-bottom: 50px;
  letter-spacing: 4px;
  font-size: 1.4em;
  color: var(--primary);
}

/* ------------------- VISIONS / MUSIC ------------------- */
.vision, .music {
  margin-bottom: 40px;
}

.vision img {
  width: 100%;
  border: 1px solid var(--primary);
  margin-bottom: 10px;
}

p {
  font-size: 0.9em;
  letter-spacing: 1px;
  color: var(--primary);
}

/* ------------------- FORM ------------------- */
form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

input, textarea, button {
  font-family: inherit;
  padding: 12px;
  border: 1px solid var(--primary);
  background: none;
  color: var(--primary);
}

button {
  cursor: pointer;
}

button:hover {
  background: var(--primary);
  color: #ffffff;
}

/* ------------------- CONTACT SECTION ------------------- */
#contact {
  background-color: var(--primary); /* navy background */
  color: #ffffff;
}

/* Card inside contact */
#contact .content-frame {
  background-color: #ffffff;
  color: var(--primary);
}

/* Form inputs inside contact card */
#contact input,
#contact textarea {
  border: 1px solid var(--primary);
  color: var(--primary);
  background: none;
}

#contact button {
  background-color: var(--primary);
  color: #ffffff;
}

#contact button:hover {
  background-color: #ffffff;
  color: var(--primary);
}

/* ------------------- FOOTER ------------------- */
footer {
  text-align: center;
  padding: 40px 10px;
  border-top: 1px solid #ffffff;
  font-size: 0.8em;
  letter-spacing: 2px;
  background-color: var(--primary);
  color: #ffffff;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <h1> • ARMIN ARDS • </h1>
</header>

<!-- NAVIGATION -->
<nav>
  <button class="tab-btn active" data-tab="visions">VISIONS</button>
  <button class="tab-btn" data-tab="music">MUSIC</button>
  <button class="tab-btn" data-tab="contact">CONTACT</button>
</nav>

<!-- VISIONS SECTION -->
<section id="visions" class="active">
  <div class="content-frame">
    <h2>VISIONS</h2>
    <div class="visions">
      <div class="vision">
        <img src="images/vision1.jpg" alt="Vision 1">
        <p>A DARK AND MOODY VISION</p>
      </div>
      <div class="vision">
        <img src="images/vision2.jpg" alt="Vision 2">
        <p>ANOTHER EERIE MOMENT</p>
      </div>
    </div>
  </div>
</section>

<!-- MUSIC SECTION -->
<section id="music">
  <div class="content-frame">
    <h2>MUSIC</h2>
    <div class="music">
      <iframe src="https://open.spotify.com/embed/track/YOUR_TRACK_ID" width="100%" height="80"></iframe>
      <p>TRACK DESCRIPTION</p>
    </div>
  </div>
</section>

<!-- CONTACT SECTION -->
<section id="contact">
  <div class="content-frame">
    <h2>CONTACT</h2>
    <form>
      <input type="text" placeholder="YOUR NAME" required>
      <input type="email" placeholder="YOUR EMAIL" required>
      <textarea rows="5" placeholder="YOUR MESSAGE" required></textarea>
      <button type="submit">SEND</button>
    </form>
  </div>
</section>

<!-- FOOTER -->
<footer>
  © 2026 ARMIN ARDS
</footer>

<!-- TAB SCRIPT -->
<script>
const tabs = document.querySelectorAll('.tab-btn');
const sections = document.querySelectorAll('section');

tabs.forEach(btn => {
  btn.addEventListener('click', () => {
    tabs.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const tab = btn.dataset.tab;
    sections.forEach(sec => {
      sec.classList.toggle('active', sec.id === tab);
    });
  });
});
</script>

</body>
</html>
