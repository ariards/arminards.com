<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARMIN ARDS</title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">

<style>
  :root {
    --primary: #1C2A5A; /* dark Persian / navy blue */
  }

  body {
    font-family: 'Courier Prime', monospace;
    margin: 0;
    background: #ffffff;
    color: var(--primary);
    text-transform: uppercase;
  }

  header {
    text-align: center;
    padding: 60px 20px 40px;
  }

  header h1 {
    font-size: 3em;
    letter-spacing: 4px;
    margin: 0;
  }

  nav {
    text-align: center;
    border-top: 1px solid var(--primary);
    border-bottom: 1px solid var(--primary);
  }

  nav button {
    background: none;
    border: none;
    padding: 15px 20px;
    font-size: 16px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 2px;
    color: var(--primary);
  }

  nav button.active {
    text-decoration: underline;
  }

  section {
    display: none;
    padding: 50px 20px;
    max-width: 800px;
    margin: auto;
  }

  section.active {
    display: block;
  }

  h2 {
    text-align: center;
    margin-bottom: 40px;
    letter-spacing: 3px;
  }

  .visions, .music {
    display: grid;
    gap: 20px;
  }

  .vision img {
    width: 100%;
    border: 1px solid var(--primary);
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 400px;
    margin: auto;
  }

  input, textarea, button {
    font-family: inherit;
    padding: 10px;
    border: 1px solid var(--primary);
    background: none;
    color: var(--primary);
  }

  button {
    cursor: pointer;
  }

  button:hover {
    background: var(--primary);
    color: #ffffff;
  }

  footer {
    text-align: center;
    padding: 30px 10px;
    border-top: 1px solid var(--primary);
    font-size: 0.9em;
  }
</style>
</head>

<body>

<header>
  <h1>ARMIN ARDS</h1>
</header>

<nav>
  <button class="tab-btn active" data-tab="visions">VISIONS</button>
  <button class="tab-btn" data-tab="music">MUSIC</button>
  <button class="tab-btn" data-tab="contact">CONTACT</button>
</nav>

<section id="visions" class="active">
  <h2>VISIONS</h2>
  <div class="visions">
    <div class="vision">
      <img src="images/vision1.jpg">
      <p>A DARK AND MOODY VISION</p>
    </div>
    <div class="vision">
      <img src="images/vision2.jpg">
      <p>ANOTHER EERIE MOMENT</p>
    </div>
  </div>
</section>

<section id="music">
  <h2>MUSIC</h2>
  <div class="music">
    <iframe src="https://open.spotify.com/embed/track/YOUR_TRACK_ID" width="100%" height="80"></iframe>
    <p>TRACK DESCRIPTION</p>
  </div>
</section>

<section id="contact">
  <h2>CONTACT</h2>
  <form>
    <input type="text" placeholder="YOUR NAME" required>
    <input type="email" placeholder="YOUR EMAIL" required>
    <textarea rows="5" placeholder="YOUR MESSAGE" required></textarea>
    <button type="submit">SEND</button>
  </form>
</section>

<footer>
  © 2026 ARMIN ARDS
</footer>

<script>
const tabs = document.querySelectorAll('.tab-btn');
const sections = document.querySelectorAll('section');

tabs.forEach(btn => {
  btn.addEventListener('click', () => {
    tabs.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const tab = btn.dataset.tab;
    sections.forEach(sec => {
      sec.classList.toggle('active', sec.id === tab);
    });
  });
});
</script>

</body>
</html>
